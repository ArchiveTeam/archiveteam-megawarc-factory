---
kind: pipeline
name: default
steps:
- name: submodules
  image: alpine/git
  commands:
  - git submodule update --init --recursive
- name: docker
  image: plugins/docker
  when:
    branch:
      - master
  settings:
    registry: atdr-writer.meo.ws
    username:
      from_secret: atdr_user
    password:
      from_secret: atdr_pass
    repo: atdr-writer.meo.ws/archiveteam/archiveteam-megawarc-factory
    dockerfile: Dockerfile
    purge: true
    auto_tag: false
    tags:
    - latest

